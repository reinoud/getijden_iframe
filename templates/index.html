<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Getijden</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #f8f9fb;
        color: #1f2937;
      }
      .card {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 0.9rem;
      }
      .control input,
      select {
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        min-width: 180px;
      }
      h1 {
        margin: 0;
        font-size: 1.2rem;
      }
      .meta {
        margin-top: 8px;
        font-size: 0.9rem;
        color: #4b5563;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 24px;
        margin-top: 10px;
      }
      .loading {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #1d4ed8;
        font-size: 0.9rem;
        visibility: hidden;
      }
      .loading.is-visible {
        visibility: visible;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(37, 99, 235, 0.2);
        border-top-color: #2563eb;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .lists {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
        margin: 14px 0;
      }
      .listbox {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
        background: #f9fafb;
      }
      .listbox h2 {
        margin: 0 0 6px 0;
        font-size: 1rem;
      }
      ul {
        margin: 0;
        padding-left: 18px;
      }
      canvas {
        width: 100%;
        max-height: 320px;
      }
      .chart-message {
        margin-top: 8px;
        font-size: 0.9rem;
        color: #4b5563;
        display: none;
      }
      .atlas {
        margin-top: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px;
        background: #f9fafb;
      }
      .atlas h2 {
        margin: 0 0 8px 0;
        font-size: 1rem;
      }
      .atlas-frame {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 10px;
      }
      .atlas-times {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 10px;
      }
      .atlas-card {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 8px;
        background: #fff;
      }
      .atlas-card h3 {
        margin: 0 0 6px 0;
        font-size: 0.95rem;
      }
      .atlas-row {
        display: block;
        font-size: 0.88rem;
        padding: 2px 0;
      }
      .atlas-image {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        display: block;
        background: #fff;
      }
      .atlas-row .atlas-time {
        display: block;
        margin-top: 4px;
        font-weight: 700;
        white-space: nowrap;
      }
      .chart-message.is-visible {
        display: block;
      }
      .footer {
        margin-top: 10px;
        font-size: 0.8rem;
        color: #6b7280;
      }
      .error {
        margin-top: 10px;
        color: #b91c1c;
        min-height: 1.2em;
      }
      .notice {
        margin-top: 8px;
        color: #1d4ed8;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <h1>Getijden per dag</h1>
        <label class="control">
          Datum
          <select id="dateSelect">
            {% for day in date_options %}
            <option value="{{ day.value }}" {% if day.value == selected_date %}selected{% endif %}>{{ day.label }}</option>
            {% endfor %}
          </select>
        </label>
      </div>

      <div class="meta">
        Locatiecode: <strong id="locationCode">{{ selected_location }}</strong>
      </div>

      <div class="status-row" aria-live="polite" aria-atomic="true">
        <div class="loading" id="loadingIndicator">
          <span class="spinner" aria-hidden="true"></span>
          <span id="loadingText">Gegevens laden…</span>
        </div>
      </div>

      <div class="lists">
        <section class="listbox">
          <h2>Hoogwater</h2>
          <ul id="highList"></ul>
        </section>
        <section class="listbox">
          <h2>Laagwater</h2>
          <ul id="lowList"></ul>
        </section>
      </div>

      <canvas id="tideChart" aria-label="Grafiek waterstanden" role="img"></canvas>
      <div class="chart-message" id="chartMessage">Grafiek niet beschikbaar voor deze datum.</div>

      <section class="atlas" aria-label="Stroomatlas Dordrecht">
        <h2>Stroomatlas Dordrecht</h2>
        <div class="atlas-times" id="atlasTimes"></div>
      </section>

      <div class="notice" id="notice"></div>
      <div class="error" id="error"></div>

      <div class="footer">
        Bron: <a href="{{ waterdata_info_url }}" target="_blank" rel="noopener noreferrer">rijkswaterstaatdata.nl/waterdata</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script>
      const dateSelect = document.getElementById('dateSelect');
      const highList = document.getElementById('highList');
      const lowList = document.getElementById('lowList');
      const noticeNode = document.getElementById('notice');
      const errorNode = document.getElementById('error');
      const locationCode = document.getElementById('locationCode');
      const loadingIndicator = document.getElementById('loadingIndicator');
      const loadingText = document.getElementById('loadingText');
      const chartCanvas = document.getElementById('tideChart');
      const chartMessage = document.getElementById('chartMessage');
      const atlasTimes = document.getElementById('atlasTimes');
      const chartCtx = chartCanvas.getContext('2d');
      const initialLocation = {{ selected_location|tojson }};

      let chart;
      let tideLoading = false;

      function updateLoadingState() {
        const isLoading = tideLoading;
        loadingIndicator.classList.toggle('is-visible', isLoading);
        loadingText.textContent = isLoading ? 'Getijdedata laden…' : 'Gereed';

        dateSelect.disabled = tideLoading;
      }

      function setTideLoading(isLoading) {
        tideLoading = isLoading;
        updateLoadingState();
      }

      function renderList(node, rows, label) {
        node.innerHTML = '';
        if (!rows.length) {
          node.innerHTML = `<li>Geen ${label} gevonden</li>`;
          return;
        }
        rows.forEach((item) => {
          const li = document.createElement('li');
          li.textContent = `${item.time} - ${item.value_cm.toFixed(1)} cm`;
          node.appendChild(li);
        });
      }

      function renderChart(points, selectedDate) {
        if (!points.length) {
          if (chart) {
            chart.destroy();
            chart = undefined;
          }
          chartCanvas.style.display = 'none';
          chartMessage.classList.add('is-visible');
          return;
        }

        chartCanvas.style.display = 'block';
        chartMessage.classList.remove('is-visible');
        const labels = points.map((p) => p.time);
        const values = points.map((p) => p.value_cm);

        if (chart) {
          chart.destroy();
        }

        chart = new Chart(chartCtx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: `Waterhoogte ${selectedDate} (cm t.o.v. NAP)`,
                data: values,
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37, 99, 235, 0.12)',
                borderWidth: 2,
                fill: true,
                tension: 0.2,
                pointRadius: 0,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                ticks: { maxTicksLimit: 12 },
              },
              y: {
                title: {
                  display: true,
                  text: 'cm t.o.v. NAP',
                },
              },
            },
            plugins: {
              legend: { display: true },
            },
          },
        });
      }

      function renderStroomatlas(windows) {
        atlasTimes.innerHTML = '';
        if (!windows || !windows.length) {
          atlasTimes.innerHTML = '<div class="atlas-card">Geen hoogwatermomenten beschikbaar voor de stroomatlas.</div>';
          return;
        }

        windows.forEach((windowData, idx) => {
          const card = document.createElement('section');
          card.className = 'atlas-card';

          const title = document.createElement('h3');
          title.textContent = `Stroomatlas rond HW ${idx + 1} (${windowData.hw_time})`;
          card.appendChild(title);

          const grid = document.createElement('div');
          grid.className = 'atlas-frame';

          (windowData.rows || []).forEach((row) => {
            const rowNode = document.createElement('div');
            rowNode.className = 'atlas-row';

            const imageNode = document.createElement('img');
            imageNode.className = 'atlas-image';
            imageNode.src = row.image_url;
            imageNode.alt = row.relative_label;
            imageNode.loading = 'lazy';
            rowNode.appendChild(imageNode);

            const timeNode = document.createElement('span');
            timeNode.className = 'atlas-time';
            timeNode.textContent = row.time;
            rowNode.appendChild(timeNode);

            grid.appendChild(rowNode);
          });

          card.appendChild(grid);

          atlasTimes.appendChild(card);
        });
      }

      async function loadDay(selectedDate, selectedLocation) {
        errorNode.textContent = '';
        noticeNode.textContent = '';
        setTideLoading(true);
        try {
          const response = await fetch(
            `/api/tides?date=${encodeURIComponent(selectedDate)}&location=${encodeURIComponent(selectedLocation)}`
          );
          if (!response.ok) {
            throw new Error(`API fout (${response.status})`);
          }

          const payload = await response.json();
          if (payload.error) {
            throw new Error(payload.error);
          }

          locationCode.textContent = payload.location;
          noticeNode.textContent = payload.message || '';
          renderList(highList, payload.high_waters || [], 'hoogwater');
          renderList(lowList, payload.low_waters || [], 'laagwater');
          renderChart(payload.points || [], selectedDate);
          renderStroomatlas(payload.stroomatlas_windows || []);

          const url = new URL(window.location.href);
          url.searchParams.set('date', selectedDate);
          url.searchParams.set('location', payload.location);
          window.history.replaceState({}, '', url.toString());
        } catch (err) {
          errorNode.textContent = err.message || 'Onbekende fout';
          noticeNode.textContent = '';
          renderList(highList, [], 'hoogwater');
          renderList(lowList, [], 'laagwater');
          renderChart([], selectedDate);
          renderStroomatlas([]);
        } finally {
          setTideLoading(false);
        }
      }

      dateSelect.addEventListener('change', (event) => {
        loadDay(event.target.value, initialLocation);
      });

      (async function init() {
        try {
          await loadDay(dateSelect.value, initialLocation);
        } catch (err) {
          errorNode.textContent = err.message || 'Initialisatie mislukt';
        }
      })();
    </script>
  </body>
</html>
